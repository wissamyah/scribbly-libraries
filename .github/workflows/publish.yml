name: publish

on:
  push:
    branches: [main]
    paths:
      - "submissions/**"
      - "schemas/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/publish.yml"

  # Lets a maintainer rerun the build (e.g. after rotating CDN hosts) from
  # the Actions tab without pushing a no-op commit.
  workflow_dispatch:

# One in-flight publish at a time. New pushes cancel an in-progress build
# rather than queue, since each push regenerates the whole manifest.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Validate every submission
        run: npm run validate

      - uses: actions/configure-pages@v5
        id: pages

      # @napi-rs/canvas ships prebuilt Skia binaries; no apt deps required.
      # Base URL comes from configure-pages so the manifest's preview/
      # download links match wherever the site actually deploys (custom
      # domain or default <owner>.github.io/<repo>).
      - name: Build manifest + render previews
        run: npx tsx scripts/build-manifest.ts --base-url "${{ steps.pages.outputs.base_url }}"
        env:
          # build-manifest exits non-zero if any submission is skipped at
          # publish time (defensive — validate.ts already gates PRs). Treat
          # that as a CI failure rather than shipping a partial manifest.
          NODE_ENV: production

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
