name: validate

on:
  pull_request:
    paths:
      - "submissions/**"
      - "schemas/**"
      - "scripts/**"
      - "test/**"
      - ".github/workflows/validate.yml"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"

defaults:
  run:
    working-directory: scribbly-libraries

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          path: scribbly-libraries
          # Slug-history check (when wired up) needs commit history; fetch
          # everything so `git log` can see prior submissions.
          fetch-depth: 0

      # @scribbly/renderer lives in the app repo's packages/renderer/. The
      # registry consumes it via a `file:../excalidrawclone/packages/renderer`
      # dep, so we check the app repo out as a sibling directory.
      - uses: actions/checkout@v4
        with:
          repository: wissamyah/scribbly
          path: excalidrawclone

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scribbly-libraries/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Validate submissions
        run: npm run validate
        env:
          GITHUB_ACTOR: ${{ github.event.pull_request.user.login }}
